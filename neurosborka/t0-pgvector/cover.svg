<polygon points="293,640 303,645 293,650" fill="#00E5C7"/>

<!-- box 2: PGVector -->
<rect x="307" y="606" width="170" height="78" rx="10" fill="#141B18" stroke="#00E5C7" stroke-width="1" stroke-opacity="0.7"/>
<text x="392" y="632" text-anchor="middle"
  font-family="'Geist Mono', ui-monospace, monospace" font-size="10" font-weight="500"
  fill="#00E5C7" letter-spacing="0.08em">EXTENSION</text>
<text x="392" y="660" text-anchor="middle"
  font-family="'Geist', -apple-system, sans-serif" font-size="18" font-weight="700"
  fill="#EDEFEE" letter-spacing="-0.02em">PGVector</text>

<!-- arrow 2 -->
<line x1="481" y1="645" x2="534" y2="645" stroke="#00E5C7" stroke-width="1.5" stroke-dasharray="4 3"/>
<polygon points="532,640 542,645 532,650" fill="#00E5C7"/>

<!-- box 3: n8n -->
<rect x="546" y="606" width="196" height="78" rx="10" fill="#141B18" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
<text x="644" y="632" text-anchor="middle"
  font-family="'Geist Mono', ui-monospace, monospace" font-size="10" font-weight="500"
  fill="rgba(237,239,238,0.40)" letter-spacing="0.08em">AUTOMATION</text>
<text x="644" y="660" text-anchor="middle"
  font-family="'Geist', -apple-system, sans-serif" font-size="18" font-weight="700"
  fill="#EDEFEE" letter-spacing="-0.02em">n8n RAG</text>

<!-- ── WHAT'S INSIDE ── -->
<text x="40" y="752"
  font-family="'Geist Mono', ui-monospace, monospace" font-size="10" font-weight="500"
  fill="rgba(237,239,238,0.35)" letter-spacing="0.10em">ЧТО ВНУТРИ</text>

<rect x="40" y="766" width="714" height="1" fill="rgba(255,255,255,0.06)"/>

<!-- list items -->
<text x="40" y="800" font-family="'Geist', -apple-system, sans-serif" font-size="14" fill="rgba(237,239,238,0.65)">
  <tspan x="40">Установка PGVector расширения в PostgreSQL</tspan>
</text>
<text x="40" y="828" font-family="'Geist', -apple-system, sans-serif" font-size="14" fill="rgba(237,239,238,0.65)">Создание таблицы с векторными полями и индексами</text>
<text x="40" y="856" font-family="'Geist', -apple-system, sans-serif" font-size="14" fill="rgba(237,239,238,0.65)">Подключение к n8n через HTTP Request и credentials</text>
<text x="40" y="884" font-family="'Geist', -apple-system, sans-serif" font-size="14" fill="rgba(237,239,238,0.65)">Базовый RAG-флоу: embeddings → сохранение → поиск</text>
<text x="40" y="912" font-family="'Geist', -apple-system, sans-serif" font-size="14" fill="rgba(237,239,238,0.65)">Готовые SQL-сниппеты и примеры n8n-нод</text>

<!-- Teal tag: free -->
<rect x="40" y="940" width="112" height="28" rx="6" fill="rgba(0,229,199,0.10)" stroke="#00E5C7" stroke-width="1" stroke-opacity="0.5"/>
<text x="96" y="958" text-anchor="middle"
  font-family="'Geist Mono', ui-monospace, monospace" font-size="11" font-weight="600"
  fill="#00E5C7" letter-spacing="0.06em">БЕСПЛАТНО</text>


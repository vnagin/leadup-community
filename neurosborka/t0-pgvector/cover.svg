<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap');
* { box-sizing: border-box; }
text { font-feature-settings: 'ss01', 'cv11'; -webkit-font-smoothing: antialiased; }
</style>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 794 1122" width="794" height="1122">
<defs>
  <pattern id="cgrid" width="48" height="48" patternUnits="userSpaceOnUse">
    <line x1="48" y1="0" x2="0" y2="0" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="48" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
  </pattern>
  <radialGradient id="ctopglow" cx="50%" cy="0%" r="90%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#00E5C7" stop-opacity="0.16"/>
    <stop offset="60%" stop-color="#00E5C7" stop-opacity="0.03"/>
    <stop offset="100%" stop-color="#0A0F0D" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="ctealline" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00E5C7" stop-opacity="0"/>
    <stop offset="20%" stop-color="#00E5C7" stop-opacity="0.8"/>
    <stop offset="80%" stop-color="#00E5C7" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#00E5C7" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="cbottomfade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#0A0F0D" stop-opacity="0"/>
    <stop offset="100%" stop-color="#141B18" stop-opacity="0.6"/>
  </linearGradient>
</defs>

<!-- Base background -->
<rect width="794" height="1122" fill="#0A0F0D"/>
<!-- Grid -->
<rect width="794" height="1122" fill="url(#cgrid)"/>
<!-- Top glow -->
<rect width="794" height="700" fill="url(#ctopglow)"/>

<!-- ── HEADER ── -->
<image href="data:image/png;base64," x="40" y="38" width="120" height="34" preserveAspectRatio="xMinYMid meet"/>
<text x="754" y="58"
  font-family="'Geist Mono', ui-monospace, monospace" font-size="10" font-weight="500"
  fill="rgba(237,239,238,0.40)" letter-spacing="0.08em" text-anchor="end">НЕЙРОСБОРКА · ПРАКТИКА</text>

<!-- Header line -->
<line x1="40" y1="90" x2="754" y2="90" stroke="url(#ctealline)" stroke-width="1"/>

<!-- ── EYEBROW ── -->
<text x="40" y="164"
  font-family="'Geist Mono', ui-monospace, monospace" font-size="11" font-weight="500"
  fill="#00E5C7" letter-spacing="0.10em">ПРАКТИЧЕСКИЙ ГАЙД</text>

<!-- ── MAIN TITLE ── -->
<text x="40" y="270"
  font-family="'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="80" font-weight="800"
  fill="#EDEFEE" letter-spacing="-0.04em">PostgreSQL</text>
<text x="40" y="366"
  font-family="'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="80" font-weight="800"
  fill="#00E5C7" letter-spacing="-0.04em">→ PGVector</text>

<!-- Subtitle -->
<text x="40" y="422"
  font-family="'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="34" font-weight="600"
  fill="rgba(237,239,238,0.70)" letter-spacing="-0.02em">Базовый RAG для n8n</text>

<!-- Short teal rule -->
<rect x="40" y="454" width="80" height="2" rx="1" fill="#00E5C7"/>

<!-- Author block -->
<text x="40" y="496"
  font-family="'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="16" font-weight="400"
  fill="rgba(237,239,238,0.70)" letter-spacing="-0.01em">Практический гайд от Алекса Нагина (LeadUp AI)</text>
<text x="40" y="520"
  font-family="'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="14" font-weight="400"
  fill="rgba(237,239,238,0.45)" letter-spacing="-0.01em">для участников сообщества Нейросборка</text>

<!-- ── TECH FLOW DIAGRAM ── -->

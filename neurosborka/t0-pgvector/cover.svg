<rect x="40" y="1060" width="714" height="1" fill="rgba(255,255,255,0.06)"/>
<text x="40" y="1094"
  font-family="'Geist Mono', ui-monospace, monospace" font-size="11" font-weight="400"
  fill="rgba(237,239,238,0.28)" letter-spacing="0.04em">v1.0 · май 2026</text>
<text x="754" y="1094" text-anchor="end"
  font-family="'Geist Mono', ui-monospace, monospace" font-size="11" font-weight="400"

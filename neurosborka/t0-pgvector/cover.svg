<rect x="40" y="606" width="196" height="78" rx="10" fill="#141B18" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
<text x="138" y="632" text-anchor="middle"
  font-family="'Geist Mono', ui-monospace, monospace" font-size="10" font-weight="500"
  fill="rgba(237,239,238,0.40)" letter-spacing="0.08em">DATABASE</text>
<text x="138" y="660" text-anchor="middle"
  font-family="'Geist', -apple-system, sans-serif" font-size="18" font-weight="700"
